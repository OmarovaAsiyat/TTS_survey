<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оценка качества синтезированной речи</title>

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap"
        rel="stylesheet">

  <style>
    :root {
      --bg:      #f4f3ef;
      --surface: #ffffff;
      --border:  #ddd9d0;
      --text:    #1a1916;
      --muted:   #706f6a;
      --accent:  #2d5fa6;
      --acc-l:   #e8eef8;
      --r:       6px;
      --mono:    "IBM Plex Mono", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "IBM Plex Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
    }

    #jspsych-target {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .jspsych-content-wrapper { width: 100%; max-width: 680px; }
    .jspsych-content          { max-width: 680px; }

    .jspsych-progressbar-container { background: var(--border); height: 4px; }
    .jspsych-progressbar-inner {
      background: var(--accent); height: 4px; transition: width .3s;
    }

    h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 14px; }
    p  { margin-bottom: 10px; }

    .jspsych-btn {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: .95rem; font-weight: 500;
      padding: 10px 28px; border-radius: var(--r);
      border: none; background: var(--accent); color: #fff;
      cursor: pointer; transition: opacity .15s;
    }
    .jspsych-btn:hover { opacity: .87; }

    .loading-box { text-align: center; padding: 60px 20px; }
    .loading-box p { color: var(--muted); font-size: .95rem; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .full-box { text-align: center; padding: 60px 20px; }
    .full-box h2 { font-size: 1.5rem; margin-bottom: 12px; }
    .full-box p  { color: var(--muted); }

    .audio-loading { font-size: .82rem; color: var(--muted); font-style: italic; }

    .diag-block {
      display: none;
      background: #fff8e1; border: 1px solid #f0c040;
      border-radius: var(--r); padding: 16px 18px; margin-top: 14px;
    }
    .diag-block.visible { display: block; }
    .diag-block p { font-weight: 600; font-size: .9rem; margin-bottom: 10px; }
    .diag-option {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; font-size: .9rem; cursor: pointer;
    }
    .diag-other {
      margin-top: 8px; width: 100%;
      font-family: "IBM Plex Sans", sans-serif; font-size: .9rem;
      padding: 6px 10px; border: 1px solid var(--border);
      border-radius: var(--r); display: none;
    }

    .functype-block {
      background: var(--acc-l); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px 18px; margin-top: 14px;
    }
    .functype-block p { font-weight: 600; font-size: .9rem; margin-bottom: 10px; }
    .functype-option {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; font-size: .9rem; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="jspsych-target">
  <div style="width:100%;max-width:680px;margin:0 auto">
    <div class="loading-box">
      <div class="spinner"></div>
      <h2>Подготовка...</h2>
      <p>Загружаем материалы и назначаем персональный набор.<br>
         Это займёт несколько секунд.</p>
    </div>
  </div>
</div>

<script>
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbxQ04SXN7KwFAFBt-bJcUyruT2fuTRqwyIkoY9WLUvJ_qiuSRHaesJyjl3zazstniaw7g/exec';
const BIBD_URL = './bibd_assignments.json';

// Тестовый режим: ?debug=1 пропускает загрузку и берёт первый стимул
const DEBUG = new URLSearchParams(window.location.search).get('debug') === '1';

const SESSION = {
  participant_id: null,
  bibd_key:       null,
  survey_set:     null,
  stimuli:        [],
  responses:      [],
  screening: {
    native: null, hearing: null,
    device: null, age: null, expert: null,
  },
};

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('Не удалось загрузить: ' + url);
  return r.json();
}

async function gasGet(action) {
  return fetchJSON(GAS_URL + '?action=' + action);
}

function extractFileId(url) {
  if (!url) return null;
  var match = url.match(/[?&]id=([^&]+)/);
  return match ? match[1] : null;
}

async function loadAudio(fileId, audioElementId) {
  try {
    var r   = await fetch(GAS_URL + '?action=audio&id=' + fileId);
    var b64 = await r.text();
    var el  = document.getElementById(audioElementId);
    if (el) {
      el.src = 'data:audio/wav;base64,' + b64;
      el.load();
      var hint = document.getElementById('loading-hint-' + audioElementId);
      if (hint) hint.style.display = 'none';
    }
  } catch (err) {
    console.error('Ошибка загрузки аудио:', err);
  }
}

async function sendResults() {
  try {
    console.log('Отправляем ответы:', JSON.stringify(SESSION.responses));
    await fetch(GAS_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action:         'save',
        participant_id: SESSION.participant_id,
        bibd_key:       SESSION.bibd_key,
        survey_set:     SESSION.survey_set,
        screening:      SESSION.screening,
        data:           SESSION.responses,
      }),
    });
    console.log('Результаты отправлены');
  } catch (err) {
    console.error('Ошибка отправки:', err);
  }
}

function showError(msg) {
  document.getElementById('jspsych-target').innerHTML =
    '<div style="width:100%;max-width:680px;margin:0 auto">' +
    '<div class="full-box"><h2>Ошибка загрузки</h2><p>' + msg + '</p>' +
    '<p style="margin-top:20px"><button class="jspsych-btn" onclick="location.reload()">Попробовать снова</button></p>' +
    '</div></div>';
}

async function init() {
  try {
    if (DEBUG) {
      // Тестовый режим — не назначаем участника, берём первый стимул
      SESSION.participant_id = 'DEBUG';
      SESSION.bibd_key       = 'P01';
      SESSION.survey_set     = 1;
      SESSION.screening      = { native: 'yes', hearing: 'no', device: 'headphones', age: '25', expert: 'no' };
      var bibd = await fetchJSON(BIBD_URL);
      SESSION.stimuli = bibd['P01'].slice(0, 1);
    } else {
      var res = await gasGet('assign');
      SESSION.participant_id = res.participant_id;
      SESSION.bibd_key       = res.bibd_key;
      SESSION.survey_set     = parseInt(res.bibd_key.replace('P', ''), 10);
      var bibd = await fetchJSON(BIBD_URL);
      if (!bibd[SESSION.bibd_key]) {
        throw new Error('Набор ' + SESSION.bibd_key + ' не найден в BIBD');
      }
      SESSION.stimuli = bibd[SESSION.bibd_key];
    }

    startExperiment();
  } catch (err) {
    showError(err.message);
  }
}

function startExperiment() {
  var jsPsych = initJsPsych({
    display_element:          'jspsych-target',
    show_progress_bar:        true,
    auto_update_progress_bar: true,
  });

  // ── Вспомогательные функции ────────────────────────────────────

  function makeMosHTML(name) {
    var html = '<div style="background:var(--surface);border:1px solid var(--border);' +
      'border-radius:var(--r);padding:18px 20px;margin-bottom:14px">' +
      '<p style="font-weight:600;margin-bottom:16px">Оцените естественность речи:</p>' +
      '<div style="display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap">' +
      '<span style="font-size:.78rem;color:var(--muted);max-width:80px;text-align:center;line-height:1.3">Очень<br>неестественно</span>';
    for (var n = 1; n <= 5; n++) {
      html += '<label style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer">' +
        '<span style="font-family:var(--mono);font-size:.85rem;color:var(--muted)">' + n + '</span>' +
        '<input type="radio" name="' + name + '" value="' + n + '" style="width:18px;height:18px;accent-color:var(--accent)">' +
        '</label>';
    }
    html += '<span style="font-size:.78rem;color:var(--muted);max-width:80px;text-align:center;line-height:1.3">Очень<br>естественно</span>' +
      '</div></div>';
    return html;
  }

  function setupButton(btn) {
    btn.disabled      = true;
    btn.style.opacity = '0.4';
    btn.style.cursor  = 'not-allowed';
    return function unlock() {
      btn.disabled      = false;
      btn.style.opacity = '1';
      btn.style.cursor  = 'pointer';
    };
  }

  function setupAudioWithCounter(fileId, audioId, countId, hintId, onPlayed) {
    var countEl   = document.getElementById(countId);
    var hintEl    = document.getElementById(hintId);
    var playsLeft = 2;

    loadAudio(fileId, audioId).then(function() {
      var audio = document.getElementById(audioId);
      if (!audio) return;
      audio.addEventListener('play', function() {
        if (playsLeft > 0) {
          playsLeft--;
          if (countEl) countEl.textContent = playsLeft;
          if (playsLeft === 0) {
            audio.controls = false;
            if (hintEl) hintEl.innerHTML = 'Лимит прослушиваний исчерпан.';
          }
          if (onPlayed) onPlayed();
        }
      });
    });
  }

  // ── Подтверждение ──────────────────────────────────────────────
  var trialAssigned = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<h2>Всё готово</h2>' +
      '<p>Пожалуйста, не обновляйте страницу и не закрывайте ' +
      'эту вкладку до завершения опроса — иначе прогресс не сохранится.</p>',
    choices: ['Начать →'],
  };

  // ── Скрининг ───────────────────────────────────────────────────
  var trialScreening = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <h2>Несколько вопросов перед началом</h2>
      <div style="background:var(--surface);border:1px solid var(--border);
                  border-radius:var(--r);padding:20px;margin:16px 0">

        <p style="font-weight:600;margin-bottom:6px">
          Является ли русский язык вашим родным (первым) языком?
        </p>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_native" value="yes"> Да
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_native" value="no"> Нет
          </label>
        </div>

        <p style="font-weight:600;margin-bottom:6px">Есть ли у вас нарушения слуха?</p>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_hearing" value="no"> Нет
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_hearing" value="yes"> Да
          </label>
        </div>

        <p style="font-weight:600;margin-bottom:6px">Что вы используете для прослушивания?</p>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_device" value="headphones"> Наушники
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_device" value="speakers"> Внешние колонки
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_device" value="laptop"> Встроенные динамики ноутбука или телефона
          </label>
        </div>

        <p style="font-weight:600;margin-bottom:6px">Ваш возраст</p>
        <input type="number" name="sc_age" min="16" max="99"
               placeholder="Например, 23"
               style="font-family:var(--mono);font-size:.95rem;
                      padding:7px 10px;border:1px solid var(--border);
                      border-radius:var(--r);width:120px;margin-bottom:20px">

        <p style="font-weight:600;margin-bottom:6px">
          Есть ли у вас профессиональный опыт работы со звуком или речью?
          <span style="font-weight:400;color:var(--muted)">(лингвист, звукорежиссёр, логопед и т.п.)</span>
        </p>
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_expert" value="no"> Нет
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_expert" value="yes"> Да
          </label>
        </div>
      </div>`,
    choices: ['Продолжить →'],
    on_load: function () {
      ['sc_native','sc_hearing','sc_device','sc_expert'].forEach(function(name) {
        document.querySelectorAll('[name="' + name + '"]').forEach(function(el) {
          el.addEventListener('change', function() {
            SESSION.screening[name.replace('sc_', '')] = this.value;
          });
        });
      });
      var ageEl = document.querySelector('[name="sc_age"]');
      if (ageEl) ageEl.addEventListener('input', function() { SESSION.screening.age = this.value; });
    },
    on_finish: function () {},
  };

  // ── Отсев ──────────────────────────────────────────────────────
  var trialDisqualified = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<div style="text-align:center;padding:40px 0">' +
      '<h2>Спасибо за интерес</h2>' +
      '<p>К сожалению, вы не подходите под критерии участия в этом исследовании.</p>' +
      '<p style="color:var(--muted);margin-top:12px">Для участия необходимо быть носителем русского языка и не иметь нарушений слуха.</p>' +
      '</div>',
    choices: [],
  };

  // ── Инструкция ─────────────────────────────────────────────────
  var trialInstructions = {
    type: jsPsychInstructions,
    pages: [
      '<h2>Добро пожаловать!</h2>' +
      '<p>Вы участвуете в исследовании компьютерного синтеза русской речи, которое проводит кафедра фонетики СПбГУ.</p>' +
      '<p>Вам предстоит прослушать короткие аудиозаписи и оценить их качество. Всего около 35 записей.</p>' +
      '<p>Время прохождения: <strong>20–25 минут</strong>.<br>Пожалуйста, слушайте в наушниках или через внешние колонки в тихом помещении.</p>',

      '<h2>Как оценивать</h2>' +
      '<p>Для каждой записи вы выставите оценку по пятибалльной шкале:</p>' +
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin:16px 0">' +
      '<div style="display:grid;grid-template-columns:auto 1fr;gap:10px 16px;align-items:start">' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">5</span><span><strong>Очень естественно</strong> — практически как живая речь</span>' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">4</span><span><strong>Естественно</strong> — звучит хорошо, мелкие огрехи не мешают</span>' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">3</span><span><strong>Нейтрально</strong> — есть недостатки, но терпимо</span>' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">2</span><span><strong>Неестественно</strong> — заметные проблемы, мешающие восприятию</span>' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">1</span><span><strong>Очень неестественно</strong> — явные ошибки, слушать некомфортно</span>' +
      '</div></div>' +
      '<p>Оценивайте каждую запись <strong>независимо</strong>, не сравнивая с предыдущими.</p>',

      '<h2>Важные правила</h2>' +
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin:16px 0;display:flex;flex-direction:column;gap:14px">' +
      '<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:1.3rem">🎧</span><span>Каждую запись можно прослушать <strong>не более двух раз</strong>. После второго воспроизведения кнопка плеера заблокируется.</span></div>' +
      '<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:1.3rem">⏭️</span><span>Кнопка <strong>«Далее»</strong> становится активной только после того, как вы прослушали запись и выставили оценку.</span></div>' +
      '<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:1.3rem">💬</span><span>Для некоторых записей появится <strong>дополнительный вопрос</strong> — отвечайте по первому впечатлению.</span></div>' +
      '<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:1.3rem">🔄</span><span>Не обновляйте страницу — прогресс не сохраняется между сессиями.</span></div>' +
      '</div>',
    ],
    show_clickable_nav: true,
    button_label_next:     'Далее →',
    button_label_previous: '← Назад',
  };

  // ── Пробный блок ───────────────────────────────────────────────
  var PRACTICE_STIMULI = [
    { fileId: '11UXbG8RI5j0kD15fIEodMkxsfPRyXBDB', label: 'Запись 1 из 4', quality: 'bad'  },
    { fileId: '1oYpG5oJ6hgS8vyMlkHC6hYJ_2GNmPTSE', label: 'Запись 2 из 4', quality: 'good' },
    { fileId: '120cTFpIvUaL_EiPXNH8ni59DJD2npwNb',  label: 'Запись 3 из 4', quality: 'bad'  },
    { fileId: '1iiAgY9DqRfVQygoXLtmaYA0BrbW_6BkR',  label: 'Запись 4 из 4', quality: 'good' },
  ];

  var trialPracticeIntro = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<div style="text-align:center;padding:20px 0">' +
      '<h2>Пробный блок</h2>' +
      '<p>Перед началом основного теста вы прослушаете четыре записи в том же формате.</p>' +
      '<p>Оценивайте так же, как будете оценивать в основном блоке — по первому впечатлению.</p>' +
      '</div>',
    choices: ['Начать →'],
  };

  var practiceTrials = PRACTICE_STIMULI.map(function(stim, idx) {
    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: function() {
        return '<div style="background:var(--acc-l);border:1px solid var(--border);' +
          'border-radius:var(--r);padding:14px 18px;margin-bottom:20px;' +
          'display:flex;align-items:center;gap:12px">' +
          '<span style="font-family:var(--mono);font-size:.8rem;color:var(--accent);white-space:nowrap">' + stim.label + '</span>' +
          '<div style="flex:1;display:flex;flex-direction:column;gap:4px">' +
          '<audio id="audio-practice-' + idx + '" controls style="width:100%;height:34px"></audio>' +
          '<span class="audio-loading" id="loading-hint-audio-practice-' + idx + '">Загрузка аудио...</span>' +
          '</div></div>' +
          makeMosHTML('practice_mos_' + idx) +
          '<p style="font-size:.82rem;color:var(--muted);text-align:center" id="practice-hint-' + idx + '">' +
          'Прослушайте запись перед оценкой. Доступно прослушиваний: <strong id="practice-count-' + idx + '">2</strong></p>';
      },
      choices: ['Далее →'],
      on_load: function() {
        var btn    = document.querySelector('.jspsych-btn');
        var unlock = setupButton(btn);
        var played = false, rated = false;
        function tryUnlock() { if (played && rated) unlock(); }

        setupAudioWithCounter(
          stim.fileId, 'audio-practice-' + idx,
          'practice-count-' + idx, 'practice-hint-' + idx,
          function() { played = true; tryUnlock(); }
        );

        document.querySelectorAll('input[name="practice_mos_' + idx + '"]').forEach(function(r) {
          r.addEventListener('change', function() { rated = true; tryUnlock(); });
        });
      },
      on_finish: function(data) {
        var sel = document.querySelector('input[name="practice_mos_' + idx + '"]:checked');
        data.practice_mos   = sel ? parseInt(sel.value) : null;
        data.is_practice    = true;
        data.anchor_quality = stim.quality;
      },
    };
  });

  var trialPracticeDone = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<div style="text-align:center;padding:30px 0"><h2>Можно начинать</h2>' +
      '<p>Нажмите кнопку, чтобы перейти к основной части.</p></div>',
    choices: ['Продолжить →'],
  };

  // ── Основной блок MOS ──────────────────────────────────────────
  var mainTrials = SESSION.stimuli.map(function(stim, idx) {    var fileId      = extractFileId(stim.url);
    var isDialogue  = stim.block === 'dialogue';
    var audioId     = 'audio-main-' + idx;
    var total       = SESSION.stimuli.length;

    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: function() {
        var html = '<div style="background:var(--acc-l);border:1px solid var(--border);' +
          'border-radius:var(--r);padding:14px 18px;margin-bottom:20px;' +
          'display:flex;align-items:center;gap:12px">' +
          '<span style="font-family:var(--mono);font-size:.78rem;color:var(--accent);white-space:nowrap">' +
          (idx + 1) + ' / ' + total + '</span>' +
          '<div style="flex:1;display:flex;flex-direction:column;gap:4px">' +
          '<audio id="' + audioId + '" controls style="width:100%;height:34px"></audio>' +
          '<span class="audio-loading" id="loading-hint-' + audioId + '">Загрузка аудио...</span>' +
          '</div></div>';

        html += makeMosHTML('mos_' + idx);

        html += '<div class="diag-block" id="diag-block-' + idx + '">' +
          '<p>Что именно звучит неестественно? (можно выбрать несколько)</p>' +
          [['Неправильное ударение в словах','ударение'],
           ['Неестественный или неприятный тембр голоса','тембр'],
           ['Резкие скачки или перепады голоса','скачки'],
           ['Носовой / гнусавый оттенок','носовой'],
           ['Нечёткое или смазанное произношение звуков','произношение'],
           ['Неподходящая интонация','интонация'],
           ['Посторонние шумы или артефакты записи','шумы']].map(function(pair) {
            return '<label class="diag-option"><input type="checkbox" name="diag_' + idx + '" value="' + pair[1] + '">' + pair[0] + '</label>';
          }).join('') +
          '<label class="diag-option"><input type="checkbox" name="diag_' + idx + '" value="другое" id="diag-other-cb-' + idx + '">Другое</label>' +
          '<input type="text" class="diag-other" id="diag-other-text-' + idx + '" placeholder="Опишите кратко...">' +
          '</div>';

        if (isDialogue) {
          html += '<div class="functype-block">' +
            '<p>Какой тип высказывания вы услышали?</p>' +
            [['Вопрос','question'],['Краткий ответ','short_answer'],
             ['Побуждение / просьба','imperative'],['Эмоциональная реплика','emotional'],
             ['Дискурсивный маркер','discourse'],['Затрудняюсь определить','unknown']].map(function(pair) {
              return '<label class="functype-option"><input type="radio" name="functype_' + idx + '" value="' + pair[1] + '">' + pair[0] + '</label>';
            }).join('') + '</div>';
        }

        html += '<p style="font-size:.82rem;color:var(--muted);text-align:center" id="main-hint-' + idx + '">' +
          'Прослушайте запись перед оценкой. Доступно прослушиваний: <strong id="main-count-' + idx + '">2</strong></p>';

        return html;
      },

      choices: ['Далее →'],

      on_load: function() {
        var btn         = document.querySelector('.jspsych-btn');
        var unlock      = setupButton(btn);
        var played      = false;
        var rated       = false;
        var hasFunctype = !isDialogue;

        var currentMos      = null;
        var currentDiag     = [];
        var currentFunctype = null;

        function tryUnlock() { if (played && rated && hasFunctype) unlock(); }

        setupAudioWithCounter(
          fileId, audioId,
          'main-count-' + idx, 'main-hint-' + idx,
          function() { played = true; tryUnlock(); }
        );

        document.querySelectorAll('input[name="mos_' + idx + '"]').forEach(function(r) {
          r.addEventListener('change', function() {
            currentMos = parseInt(this.value);
            rated = true;
            var diagBlock = document.getElementById('diag-block-' + idx);
            if (currentMos <= 3) {
              diagBlock.classList.add('visible');
            } else {
              diagBlock.classList.remove('visible');
              currentDiag = [];
            }
            tryUnlock();
          });
        });

        document.querySelectorAll('[name="diag_' + idx + '"]').forEach(function(cb) {
          cb.addEventListener('change', function() {
            currentDiag = [];
            document.querySelectorAll('input[name="diag_' + idx + '"]:checked').forEach(function(c) {
              currentDiag.push(c.value);
            });
          });
        });

        var otherCb  = document.getElementById('diag-other-cb-' + idx);
        var otherTxt = document.getElementById('diag-other-text-' + idx);
        if (otherCb && otherTxt) {
          otherCb.addEventListener('change', function() {
            otherTxt.style.display = this.checked ? 'block' : 'none';
          });
        }

        if (isDialogue) {
          document.querySelectorAll('input[name="functype_' + idx + '"]').forEach(function(r) {
            r.addEventListener('change', function() {
              currentFunctype = this.value;
              hasFunctype = true;
              tryUnlock();
            });
          });
        }

        SESSION['_trial_' + idx] = {
          getMos:      function() { return currentMos; },
          getDiag:     function() {
            var d = currentDiag.slice();
            if (otherTxt && otherTxt.value.trim() && otherCb && otherCb.checked) {
              d.push('другое: ' + otherTxt.value.trim());
            }
            return d;
          },
          getFunctype: function() { return currentFunctype; },
        };
      },

      on_finish: function() {
        var saved          = SESSION['_trial_' + idx];
        var mosScore       = saved ? saved.getMos()      : null;
        var diagnostics    = saved ? saved.getDiag()     : [];
        var functypeAnswer = saved ? saved.getFunctype() : null;

        SESSION.responses.push({
          participant_id:   SESSION.participant_id,
          bibd_key:         SESSION.bibd_key,
          survey_set:       SESSION.survey_set,
          timestamp:        new Date().toISOString(),
          block:            stim.block,
          text_id:          stim.text_id,
          system:           stim.system,
          order:            stim.order,
          mos_score:        mosScore,
          diagnostics:      diagnostics,
          func_type_answer: functypeAnswer,
          is_anchor:        false,
          anchor_type:      '',
        });

        delete SESSION['_trial_' + idx];
      },
    };
  });

  // ── Завершение ─────────────────────────────────────────────────
  var trialGoodbye = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<div style="text-align:center;padding:40px 0">' +
      '<h2>Спасибо за участие!</h2>' +
      '<p>Ваши ответы записаны. Страницу можно закрыть.</p>' +
      '<p style="color:var(--muted);font-size:.9rem;margin-top:16px">Исследование проводит кафедра фонетики СПбГУ.</p>' +
      '</div>',
    choices: [],
    on_load: async function() {
      await sendResults();
    },
  };

  // ── Запуск ─────────────────────────────────────────────────────
  if (DEBUG) {
    // В тестовом режиме сразу к основному блоку
    jsPsych.run(mainTrials.concat([trialGoodbye]));
  } else {
    jsPsych.run([
      trialAssigned,
      trialScreening,
      {
        timeline: [trialDisqualified],
        conditional_function: function() {
          return SESSION.screening.native  === 'no' ||
                 SESSION.screening.hearing === 'yes';
        },
      },
      {
        timeline: [trialInstructions, trialPracticeIntro]
          .concat(practiceTrials)
          .concat([trialPracticeDone])
          .concat(mainTrials)
          .concat([trialGoodbye]),
        conditional_function: function() {
          return SESSION.screening.native  === 'yes' &&
                 SESSION.screening.hearing === 'no';
        },
      },
    ]);
  }
}

init();
</script>
</body>
</html>
