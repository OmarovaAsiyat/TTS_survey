<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оценка качества синтезированной речи</title>

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap"
        rel="stylesheet">

  <style>
    :root {
      --bg:      #f4f3ef;
      --surface: #ffffff;
      --border:  #ddd9d0;
      --text:    #1a1916;
      --muted:   #706f6a;
      --accent:  #2d5fa6;
      --acc-l:   #e8eef8;
      --r:       6px;
      --mono:    "IBM Plex Mono", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "IBM Plex Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
    }

    #jspsych-target {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .jspsych-content-wrapper { width: 100%; max-width: 680px; }
    .jspsych-content          { max-width: 680px; }

    .jspsych-progressbar-container { background: var(--border); height: 4px; }
    .jspsych-progressbar-inner {
      background: var(--accent);
      height: 4px;
      transition: width .3s;
    }

    h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 14px; }
    p  { margin-bottom: 10px; }

    .jspsych-btn {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: .95rem;
      font-weight: 500;
      padding: 10px 28px;
      border-radius: var(--r);
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: opacity .15s;
    }
    .jspsych-btn:hover { opacity: .87; }

    .loading-box { text-align: center; padding: 60px 20px; }
    .loading-box p { color: var(--muted); font-size: .95rem; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .full-box { text-align: center; padding: 60px 20px; }
    .full-box h2 { font-size: 1.5rem; margin-bottom: 12px; }
    .full-box p  { color: var(--muted); }
  </style>
</head>
<body>
<div id="jspsych-target"></div>

<script>
// ================================================================
// КОНФИГУРАЦИЯ
// ================================================================
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbxQ04SXN7KwFAFBt-bJcUyruT2fuTRqwyIkoY9WLUvJ_qiuSRHaesJyjl3zazstniaw7g/exec';
const BIBD_URL = './bibd_assignments.json';

// ================================================================
// ГЛОБАЛЬНОЕ СОСТОЯНИЕ СЕССИИ
// ================================================================
const SESSION = {
  participant_id: null,
  survey_set:     null,
  stimuli:        [],
  screening: {
    native:  null,
    hearing: null,
    device:  null,
    age:     null,
    expert:  null,
  },
};

// ================================================================
// ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// ================================================================
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('Не удалось загрузить файл: ' + url);
  return r.json();
}

async function gasGet(action) {
  return fetchJSON(GAS_URL + '?action=' + action);
}

function pidToSetNumber(pid) {
  return parseInt(pid.replace('P', ''), 10);
}

// ================================================================
// ИНИЦИАЛИЗАЦИЯ jsPsych
// ================================================================
const jsPsych = initJsPsych({
  display_element:          'jspsych-target',
  show_progress_bar:        true,
  auto_update_progress_bar: true,
});

// ================================================================
// БЛОК 1. ЗАГРУЗКА И НАЗНАЧЕНИЕ УЧАСТНИКА
// ================================================================
const trialLoading = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="loading-box">
      <div class="spinner"></div>
      <h2>Подготовка...</h2>
      <p>Загружаем материалы и назначаем персональный набор.<br>
         Это займёт несколько секунд.</p>
    </div>`,
  choices: [],
  trial_duration: null,

  on_load: async function () {
    try {
      const assignResult = await gasGet('assign');

      if (assignResult.status === 'full') {
        document.querySelector('.jspsych-content').innerHTML = `
          <div class="full-box">
            <h2>Набор участников завершён</h2>
            <p>Спасибо за интерес к исследованию.<br>
               Все места уже заняты — следите за нашими
               следующими исследованиями.</p>
          </div>`;
        return;
      }

      SESSION.participant_id = assignResult.participant_id;
      SESSION.survey_set     = pidToSetNumber(SESSION.participant_id);

      const bibd = await fetchJSON(BIBD_URL);
      if (!bibd[SESSION.participant_id]) {
        throw new Error('Набор для ' + SESSION.participant_id + ' не найден');
      }
// bibd_key — базовый набор P01..P50, participant_id может быть P01_2 и т.д.
const bidbKey = assignResult.bibd_key || SESSION.participant_id.replace(/_\d+$/, '');
SESSION.stimuli = bibd[bidbKey];
      jsPsych.finishTrial();

    } catch (err) {
      document.querySelector('.jspsych-content').innerHTML = `
        <div class="full-box">
          <h2>Ошибка загрузки</h2>
          <p>${err.message}</p>
          <p style="margin-top:20px">
            <button class="jspsych-btn" onclick="location.reload()">
              Попробовать снова
            </button>
          </p>
        </div>`;
    }
  },
};

// ================================================================
// БЛОК 2. ЭКРАН ПОДТВЕРЖДЕНИЯ
// ================================================================
const trialAssigned = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Всё готово</h2>
    <p>Пожалуйста, не обновляйте страницу и не закрывайте
       эту вкладку до завершения опроса — иначе прогресс
       не сохранится.</p>`,
  choices: ['Начать →'],
};

// ================================================================
// БЛОК 3. СКРИНИНГ
// ================================================================
const trialScreening = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Несколько вопросов перед началом</h2>

    <div style="background:var(--surface);border:1px solid var(--border);
                border-radius:var(--r);padding:20px;margin:16px 0">

      <p style="font-weight:600;margin-bottom:6px">
        Является ли русский язык вашим родным (первым) языком?
      </p>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="sc_native" value="yes"> Да
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="sc_native" value="no"> Нет
        </label>
      </div>

      <p style="font-weight:600;margin-bottom:6px">
        Есть ли у вас нарушения слуха?
      </p>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="sc_hearing" value="no"> Нет
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="sc_hearing" value="yes"> Да
        </label>
      </div>

      <p style="font-weight:600;margin-bottom:6px">
        Что вы используете для прослушивания?
      </p>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="sc_device" value="headphones">
          Наушники
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="sc_device" value="speakers">
          Внешние колонки
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="sc_device" value="laptop">
          Встроенные динамики ноутбука или телефона
        </label>
      </div>

      <p style="font-weight:600;margin-bottom:6px">Ваш возраст</p>
      <input type="number" name="sc_age" min="16" max="99"
             placeholder="Например, 23"
             style="font-family:var(--mono);font-size:.95rem;
                    padding:7px 10px;border:1px solid var(--border);
                    border-radius:var(--r);width:120px;margin-bottom:20px">

      <p style="font-weight:600;margin-bottom:6px">
        Есть ли у вас профессиональный опыт работы со звуком или речью?
        <span style="font-weight:400;color:var(--muted)">
          (лингвист, звукорежиссёр, логопед и т.п.)
        </span>
      </p>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="sc_expert" value="no"> Нет
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="sc_expert" value="yes"> Да
        </label>
      </div>
    </div>`,

  choices: ['Продолжить →'],

  on_load: function () {
    ['sc_native','sc_hearing','sc_device','sc_expert'].forEach(function(name) {
      document.querySelectorAll('[name="' + name + '"]').forEach(function(el) {
        el.addEventListener('change', function() {
          SESSION.screening[name.replace('sc_', '')] = this.value;
        });
      });
    });
    var ageEl = document.querySelector('[name="sc_age"]');
    if (ageEl) {
      ageEl.addEventListener('input', function() {
        SESSION.screening.age = this.value;
      });
    }
  },

  on_finish: function () {},
};

// ================================================================
// БЛОК 4. ЭКРАН ОТСЕВА
// ================================================================
const trialDisqualified = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div style="text-align:center;padding:40px 0">
      <h2>Спасибо за интерес</h2>
      <p>К сожалению, вы не подходите под критерии участия
         в этом исследовании.</p>
      <p style="color:var(--muted);margin-top:12px">
        Для участия необходимо быть носителем русского языка
        и не иметь нарушений слуха.
      </p>
    </div>`,
  choices: [],
};

// ================================================================
// БЛОК 5. ИНСТРУКЦИЯ
// ================================================================
const trialInstructions = {
  type: jsPsychInstructions,
  pages: [
    `<h2>Добро пожаловать!</h2>
     <p>Вы участвуете в исследовании компьютерного синтеза
        русской речи, которое проводит кафедра фонетики СПбГУ.</p>
     <p>Вам предстоит прослушать короткие аудиозаписи и оценить
        их качество. Всего около 35 записей.</p>
     <p>Время прохождения: <strong>20–25 минут</strong>.<br>
        Пожалуйста, слушайте в наушниках или через внешние
        колонки в тихом помещении.</p>`,

    `<h2>Как оценивать</h2>
     <p>Для каждой записи вы выставите оценку
        по пятибалльной шкале:</p>
     <div style="background:var(--surface);border:1px solid var(--border);
                 border-radius:var(--r);padding:20px;margin:16px 0">
       <div style="display:grid;grid-template-columns:auto 1fr;
                   gap:10px 16px;align-items:start">
         <span style="font-family:var(--mono);font-size:1.1rem;
                      color:var(--accent);font-weight:600">5</span>
         <span><strong>Очень естественно</strong> —
               практически как живая речь</span>
         <span style="font-family:var(--mono);font-size:1.1rem;
                      color:var(--accent);font-weight:600">4</span>
         <span><strong>Естественно</strong> —
               звучит хорошо, мелкие огрехи не мешают</span>
         <span style="font-family:var(--mono);font-size:1.1rem;
                      color:var(--accent);font-weight:600">3</span>
         <span><strong>Нейтрально</strong> —
               есть недостатки, но терпимо</span>
         <span style="font-family:var(--mono);font-size:1.1rem;
                      color:var(--accent);font-weight:600">2</span>
         <span><strong>Неестественно</strong> —
               заметные проблемы, мешающие восприятию</span>
         <span style="font-family:var(--mono);font-size:1.1rem;
                      color:var(--accent);font-weight:600">1</span>
         <span><strong>Очень неестественно</strong> —
               явные ошибки, слушать некомфортно</span>
       </div>
     </div>
     <p>Оценивайте каждую запись <strong>независимо</strong>,
        не сравнивая с предыдущими.</p>`,

    `<h2>Важные правила</h2>
     <div style="background:var(--surface);border:1px solid var(--border);
                 border-radius:var(--r);padding:20px;margin:16px 0;
                 display:flex;flex-direction:column;gap:14px">
       <div style="display:flex;gap:12px;align-items:flex-start">
         <span style="font-size:1.3rem">🎧</span>
         <span>Каждую запись можно прослушать
               <strong>не более двух раз</strong>.
               После второго воспроизведения кнопка
               плеера заблокируется.</span>
       </div>
       <div style="display:flex;gap:12px;align-items:flex-start">
         <span style="font-size:1.3rem">⏭️</span>
         <span>Кнопка <strong>«Далее»</strong> становится
               активной только после того, как вы прослушали
               запись и выставили оценку.</span>
       </div>
       <div style="display:flex;gap:12px;align-items:flex-start">
         <span style="font-size:1.3rem">💬</span>
         <span>Для некоторых записей появится
               <strong>дополнительный вопрос</strong> —
               отвечайте по первому впечатлению.</span>
       </div>
       <div style="display:flex;gap:12px;align-items:flex-start">
         <span style="font-size:1.3rem">🔄</span>
         <span>Не обновляйте страницу — прогресс не сохраняется
               между сессиями.</span>
       </div>
     </div>`,
  ],
  show_clickable_nav: true,
  button_label_next:     'Далее →',
  button_label_previous: '← Назад',
};

// ================================================================
// БЛОК 6. ПРОБНЫЙ БЛОК (якоря — участник не знает)
// ================================================================
const PRACTICE_STIMULI = [
  {
    url:     'https://script.google.com/macros/s/AKfycbxQ04SXN7KwFAFBt-bJcUyruT2fuTRqwyIkoY9WLUvJ_qiuSRHaesJyjl3zazstniaw7g/exec?action=audio&id=11UXbG8RI5j0kD15fIEodMkxsfPRyXBDB',
    label:   'Запись 1 из 4',
    quality: 'bad',
  },
  {
    url:     'https://script.google.com/macros/s/AKfycbxQ04SXN7KwFAFBt-bJcUyruT2fuTRqwyIkoY9WLUvJ_qiuSRHaesJyjl3zazstniaw7g/exec?action=audio&id=1oYpG5oJ6hgS8vyMlkHC6hYJ_2GNmPTSE',
    label:   'Запись 2 из 4',
    quality: 'good',
  },
  {
    url:     'https://script.google.com/macros/s/AKfycbxQ04SXN7KwFAFBt-bJcUyruT2fuTRqwyIkoY9WLUvJ_qiuSRHaesJyjl3zazstniaw7g/exec?action=audio&id=120cTFpIvUaL_EiPXNH8ni59DJD2npwNb',
    label:   'Запись 3 из 4',
    quality: 'bad',
  },
  {
    url:     'https://script.google.com/macros/s/AKfycbxQ04SXN7KwFAFBt-bJcUyruT2fuTRqwyIkoY9WLUvJ_qiuSRHaesJyjl3zazstniaw7g/exec?action=audio&id=1iiAgY9DqRfVQygoXLtmaYA0BrbW_6BkR',
    label:   'Запись 4 из 4',
    quality: 'good',
  },
];

const trialPracticeIntro = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div style="text-align:center;padding:20px 0">
      <h2>Пробный блок</h2>
      <p>Перед началом основного теста вы прослушаете
         четыре записи в том же формате.</p>
      <p>Оценивайте так же, как будете оценивать
         в основном блоке — по первому впечатлению.</p>
    </div>`,
  choices: ['Начать →'],
};

function buildPracticeTrials() {
  return PRACTICE_STIMULI.map(function(stim, idx) {
    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: function() {
        return `
          <div style="background:var(--acc-l);border:1px solid var(--border);
                      border-radius:var(--r);padding:14px 18px;margin-bottom:20px;
                      display:flex;align-items:center;gap:12px">
            <span style="font-family:var(--mono);font-size:.8rem;
                         color:var(--accent);white-space:nowrap">
              ${stim.label}
            </span>
            <audio id="practice-audio-${idx}" controls preload="auto"
                   style="flex:1;height:34px">
              <source src="${stim.url}" type="audio/wav">
            </audio>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);
                      border-radius:var(--r);padding:18px 20px;margin-bottom:14px">
            <p style="font-weight:600;margin-bottom:16px">
              Оцените естественность речи:
            </p>
            <div style="display:flex;align-items:center;
                        justify-content:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:.78rem;color:var(--muted);
                           max-width:80px;text-align:center;line-height:1.3">
                Очень<br>неестественно
              </span>
              ${[1,2,3,4,5].map(function(n) {
                return `
                <label style="display:flex;flex-direction:column;
                              align-items:center;gap:4px;cursor:pointer">
                  <span style="font-family:var(--mono);font-size:.85rem;
                               color:var(--muted)">${n}</span>
                  <input type="radio" name="practice_mos_${idx}"
                         value="${n}"
                         style="width:18px;height:18px;
                                accent-color:var(--accent)">
                </label>`;
              }).join('')}
              <span style="font-size:.78rem;color:var(--muted);
                           max-width:80px;text-align:center;line-height:1.3">
                Очень<br>естественно
              </span>
            </div>
          </div>
          <p style="font-size:.82rem;color:var(--muted);text-align:center"
             id="practice-hint-${idx}">
            Прослушайте запись перед оценкой.
            Доступно прослушиваний:
            <strong id="practice-count-${idx}">2</strong>
          </p>`;
      },

      choices: ['Далее →'],

      on_load: function() {
        var btn     = document.querySelector('.jspsych-btn');
        var audio   = document.getElementById('practice-audio-' + idx);
        var countEl = document.getElementById('practice-count-' + idx);
        var hintEl  = document.getElementById('practice-hint-' + idx);

        var playsLeft = 2;
        var hasPlayed = false;
        var hasRated  = false;

        btn.disabled      = true;
        btn.style.opacity = '0.4';
        btn.style.cursor  = 'not-allowed';

        function tryUnlock() {
          if (hasPlayed && hasRated) {
            btn.disabled      = false;
            btn.style.opacity = '1';
            btn.style.cursor  = 'pointer';
          }
        }

        audio.addEventListener('play', function() {
          if (playsLeft > 0) {
            playsLeft--;
            hasPlayed = true;
            countEl.textContent = playsLeft;
            if (playsLeft === 0) {
              audio.controls = false;
              hintEl.innerHTML = 'Лимит прослушиваний исчерпан.';
            }
            tryUnlock();
          }
        });

        document.querySelectorAll(
          'input[name="practice_mos_' + idx + '"]'
        ).forEach(function(r) {
          r.addEventListener('change', function() {
            hasRated = true;
            tryUnlock();
          });
        });
      },

      on_finish: function(data) {
        var sel = document.querySelector(
          'input[name="practice_mos_' + idx + '"]:checked'
        );
        data.practice_mos   = sel ? parseInt(sel.value) : null;
        data.practice_index = idx;
        data.is_practice    = true;
        data.anchor_quality = stim.quality;
      },
    };
  });
}

const trialPracticeDone = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div style="text-align:center;padding:30px 0">
      <h2>Можно начинать</h2>
      <p>Нажмите кнопку, чтобы перейти к основной части.</p>
    </div>`,
  choices: ['Продолжить →'],
};

// ================================================================
// ЗАПУСК
// ================================================================
jsPsych.run([
  trialLoading,
  trialAssigned,
  trialScreening,

  {
    timeline: [trialDisqualified],
    conditional_function: function() {
      return SESSION.screening.native  === 'no' ||
             SESSION.screening.hearing === 'yes';
    },
  },

  {
    timeline: [
      trialInstructions,
      trialPracticeIntro,
      ...buildPracticeTrials(),
      trialPracticeDone,
    ],
    conditional_function: function() {
      return SESSION.screening.native  === 'yes' &&
             SESSION.screening.hearing === 'no';
    },
  },
]);
</script>
</body>
</html>
