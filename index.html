<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оценка качества синтезированной речи</title>

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap"
        rel="stylesheet">

  <style>
    :root {
      --bg:      #f4f3ef;
      --surface: #ffffff;
      --border:  #ddd9d0;
      --text:    #1a1916;
      --muted:   #706f6a;
      --accent:  #2d5fa6;
      --acc-l:   #e8eef8;
      --r:       6px;
      --mono:    "IBM Plex Mono", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "IBM Plex Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
    }

    /* Прогресс-бар jsPsych — скрываем полностью */
    .jspsych-progressbar-container { display: none !important; }

    #jspsych-target {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .jspsych-content-wrapper { width: 100%; max-width: 680px; }
    .jspsych-content          { max-width: 680px; }

    h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 14px; }
    p  { margin-bottom: 10px; }

    .jspsych-btn {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: .95rem; font-weight: 500;
      padding: 10px 28px; border-radius: var(--r);
      border: none; background: var(--accent); color: #fff;
      cursor: pointer; transition: opacity .15s;
    }
    .jspsych-btn:hover { opacity: .87; }

    .loading-box { text-align: center; padding: 60px 20px; }
    .loading-box p { color: var(--muted); font-size: .95rem; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .full-box { text-align: center; padding: 60px 20px; }
    .full-box h2 { font-size: 1.5rem; margin-bottom: 12px; }
    .full-box p  { color: var(--muted); }

    .audio-loading { font-size: .82rem; color: var(--muted); font-style: italic; }

    /* MOS шкала */
    .mos-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .mos-radios {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .mos-anchor {
      font-size: .78rem;
      color: var(--muted);
      max-width: 80px;
      text-align: center;
      line-height: 1.3;
    }

    .mos-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .mos-item span {
      font-family: var(--mono);
      font-size: .85rem;
      color: var(--muted);
    }

    .mos-item input[type="radio"] {
      width: 18px; height: 18px;
      accent-color: var(--accent);
    }

    /* Динамическая подсказка MOS */
    .mos-hint {
      min-height: 22px;
      text-align: center;
      font-size: .85rem;
      color: var(--accent);
      font-weight: 500;
      transition: opacity .2s;
    }

    /* Диагностика */
    .diag-block {
      display: none;
      background: #fff8e1;
      border: 1px solid #f0c040;
      border-radius: var(--r);
      padding: 16px 18px;
      margin-top: 14px;
    }
    .diag-block.visible { display: block; }
    .diag-block p { font-weight: 600; font-size: .9rem; margin-bottom: 10px; }
    .diag-option {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; font-size: .9rem; cursor: pointer;
    }
    .diag-other {
      margin-top: 8px; width: 100%;
      font-family: "IBM Plex Sans", sans-serif; font-size: .9rem;
      padding: 6px 10px; border: 1px solid var(--border);
      border-radius: var(--r); display: none;
    }

    /* Контекст диалоговой реплики */
    .context-block {
      background: var(--acc-l);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
      margin-top: 14px;
    }
    .context-block p { font-weight: 600; font-size: .9rem; margin-bottom: 10px; }
    .context-option {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; font-size: .9rem; cursor: pointer;
    }

    /* Текст реплики */
    .replica-text {
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 18px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
<div id="jspsych-target">
  <div style="width:100%;max-width:680px;margin:0 auto">
    <div class="loading-box">
      <div class="spinner"></div>
      <h2>Подготовка...</h2>
      <p>Загружаем материалы.<br>Это займёт несколько секунд.</p>
    </div>
  </div>
</div>

<script>
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbxQ04SXN7KwFAFBt-bJcUyruT2fuTRqwyIkoY9WLUvJ_qiuSRHaesJyjl3zazstniaw7g/exec';
const BIBD_URL = './bibd_assignments.json';
const DEBUG    = new URLSearchParams(window.location.search).get('debug') === '1';

const SESSION = {
  participant_id: null,
  bibd_key:       null,
  survey_set:     null,
  stimuli:        [],
  responses:      [],
  screening: {
    native: null, hearing: null,
    device: null, age: null, expert: null,
  },
};

// Описания оценок MOS
const MOS_HINTS = {
  1: 'Очень неестественно — явные ошибки, слушать некомфортно',
  2: 'Неестественно — заметные проблемы, мешающие восприятию',
  3: 'Нейтрально — есть недостатки, но терпимо',
  4: 'Естественно — звучит хорошо, мелкие огрехи не мешают',
  5: 'Очень естественно — практически как живая речь',
};

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('Не удалось загрузить: ' + url);
  return r.json();
}

async function gasGet(action) {
  return fetchJSON(GAS_URL + '?action=' + action);
}

function extractFileId(url) {
  if (!url) return null;
  var m = url.match(/[?&]id=([^&]+)/);
  return m ? m[1] : null;
}

async function loadAudio(fileId, audioId) {
  try {
    var r   = await fetch(GAS_URL + '?action=audio&id=' + fileId);
    var b64 = await r.text();
    var el  = document.getElementById(audioId);
    if (el) {
      el.src = 'data:audio/wav;base64,' + b64;
      el.load();
      var hint = document.getElementById('loading-hint-' + audioId);
      if (hint) hint.style.display = 'none';
    }
  } catch (e) { console.error('Ошибка аудио:', e); }
}

async function sendResults() {
  try {
    console.log('Отправляем:', JSON.stringify(SESSION.responses));
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action:         'save',
        participant_id: SESSION.participant_id,
        bibd_key:       SESSION.bibd_key,
        survey_set:     SESSION.survey_set,
        screening:      SESSION.screening,
        data:           SESSION.responses,
      }),
    });
  } catch (e) { console.error('Ошибка отправки:', e); }
}

function showError(msg) {
  document.getElementById('jspsych-target').innerHTML =
    '<div style="width:100%;max-width:680px;margin:0 auto">' +
    '<div class="full-box"><h2>Ошибка загрузки</h2><p>' + msg + '</p>' +
    '<p style="margin-top:20px"><button class="jspsych-btn" onclick="location.reload()">Попробовать снова</button></p>' +
    '</div></div>';
}

async function init() {
  try {
    if (DEBUG) {
      SESSION.participant_id = 'DEBUG';
      SESSION.bibd_key       = 'P01';
      SESSION.survey_set     = 1;
      SESSION.screening      = { native: 'yes', hearing: 'no', device: 'headphones', age: '25', expert: 'no' };
      var bibd = await fetchJSON(BIBD_URL);
      SESSION.stimuli = bibd['P01'].slice(4, 6);
    } else {
      var res = await gasGet('assign');
      SESSION.participant_id = res.participant_id;
      SESSION.bibd_key       = res.bibd_key;
      SESSION.survey_set     = parseInt(res.bibd_key.replace('P', ''), 10);
      var bibd = await fetchJSON(BIBD_URL);
      if (!bibd[SESSION.bibd_key]) throw new Error('Набор ' + SESSION.bibd_key + ' не найден');
      SESSION.stimuli = bibd[SESSION.bibd_key];
    }
    startExperiment();
  } catch (e) { showError(e.message); }
}

function startExperiment() {
  var jsPsych = initJsPsych({
    display_element: 'jspsych-target',
    show_progress_bar: false,
  });

  // ── Вспомогательные ────────────────────────────────────────────

  function setupButton(btn) {
    btn.disabled = true; btn.style.opacity = '0.4'; btn.style.cursor = 'not-allowed';
    return function() {
      btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
    };
  }

  function setupAudio(fileId, audioId, countId, hintId, onPlayed) {
    var countEl = document.getElementById(countId);
    var hintEl  = document.getElementById(hintId);
    var left    = 2;

    loadAudio(fileId, audioId).then(function() {
      var el = document.getElementById(audioId);
      if (!el) return;
      el.addEventListener('play', function() {
        if (left > 0) {
          left--;
          if (countEl) countEl.textContent = left;
          if (left === 0) {
            el.controls = false;
            if (hintEl) hintEl.innerHTML = 'Лимит прослушиваний исчерпан.';
          }
          if (onPlayed) onPlayed();
        }
      });
    }).catch(function() {
      // Ошибка загрузки — показываем кнопку пропуска
      if (hintEl) {
        hintEl.innerHTML = 'Не удалось загрузить аудио. ' +
          '<button onclick="document.querySelector(\'.jspsych-btn\').disabled=false;' +
          'document.querySelector(\'.jspsych-btn\').style.opacity=\'1\';' +
          'document.querySelector(\'.jspsych-btn\').style.cursor=\'pointer\';" ' +
          'style="font-family:var(--mono);font-size:.82rem;color:var(--accent);' +
          'background:none;border:none;cursor:pointer;text-decoration:underline;padding:0">' +
          'Пропустить запись</button>';
      }
    });
  });
  }

  function makeMosHTML(name) {
    return '<div class="mos-wrap">' +
      '<p style="font-weight:600;margin-bottom:14px">Оцените естественность речи:</p>' +
      '<div class="mos-radios">' +
      '<span class="mos-anchor">Очень<br>неестественно</span>' +
      [1,2,3,4,5].map(function(n) {
        return '<label class="mos-item"><span>' + n + '</span>' +
          '<input type="radio" name="' + name + '" value="' + n + '"></label>';
      }).join('') +
      '<span class="mos-anchor">Очень<br>естественно</span>' +
      '</div>' +
      '<div class="mos-hint" id="hint-' + name + '"></div>' +
      '</div>';
  }

  function bindMosHint(name) {
    document.querySelectorAll('input[name="' + name + '"]').forEach(function(r) {
      r.addEventListener('change', function() {
        var hintEl = document.getElementById('hint-' + name);
        if (hintEl) hintEl.textContent = MOS_HINTS[parseInt(this.value)] || '';
      });
    });
  }

  // ── Подтверждение ──────────────────────────────────────────────
  var trialAssigned = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<h2>Всё готово</h2>' +
      '<p>Не обновляйте страницу и не закрывайте вкладку до конца опроса — иначе прогресс не сохранится.</p>',
    choices: ['Начать →'],
  };

  // ── Скрининг ───────────────────────────────────────────────────
  var trialScreening = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <h2>Несколько вопросов перед началом</h2>
      <div style="background:var(--surface);border:1px solid var(--border);
                  border-radius:var(--r);padding:20px;margin:16px 0">

        <p style="font-weight:600;margin-bottom:6px">
          Является ли русский язык вашим родным (первым) языком?
        </p>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_native" value="yes"> Да
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_native" value="no"> Нет
          </label>
        </div>

        <p style="font-weight:600;margin-bottom:6px">Есть ли у вас нарушения слуха?</p>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_hearing" value="no"> Нет
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_hearing" value="yes"> Да
          </label>
        </div>

        <p style="font-weight:600;margin-bottom:6px">Ваш возраст</p>
        <input type="number" name="sc_age" min="1" max="99"
               placeholder="Например, 23"
               style="font-family:var(--mono);font-size:.95rem;
                      padding:7px 10px;border:1px solid var(--border);
                      border-radius:var(--r);width:120px;margin-bottom:20px">

        <p style="font-weight:600;margin-bottom:6px">Что вы используете для прослушивания?</p>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_device" value="headphones"> Наушники
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_device" value="speakers"> Внешние колонки
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_device" value="laptop"> Встроенные динамики ноутбука или телефона
          </label>
        </div>

        <p style="font-weight:600;margin-bottom:6px">
          Есть ли у вас профессиональный опыт работы со звуком или речью?
          <span style="font-weight:400;color:var(--muted)">
            (лингвист, фонетист, логопед, актёр, диктор, звукорежиссёр,
            переводчик-синхронист, преподаватель иностранных языков и т.п.)
          </span>
        </p>
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_expert" value="no"> Нет
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="radio" name="sc_expert" value="yes"> Да
          </label>
        </div>
      </div>`,
    choices: ['Продолжить →'],
    on_load: function() {
      ['sc_native','sc_hearing','sc_device','sc_expert'].forEach(function(name) {
        document.querySelectorAll('[name="' + name + '"]').forEach(function(el) {
          el.addEventListener('change', function() {
            SESSION.screening[name.replace('sc_', '')] = this.value;
          });
        });
      });
      var ageEl = document.querySelector('[name="sc_age"]');
      if (ageEl) ageEl.addEventListener('input', function() {
        SESSION.screening.age = this.value;
      });
    },
    on_finish: function() {},
  };

  // ── Отсев ──────────────────────────────────────────────────────
  var trialDisqualified = {
    type: jsPsychHtmlButtonResponse,
    stimulus: function() {
      var s = SESSION.screening;
      var reason = '';
      if (s.native === 'no') reason = 'Для участия необходимо быть носителем русского языка.';
      else if (s.hearing === 'yes') reason = 'Для участия необходимо не иметь нарушений слуха.';
      else if (parseInt(s.age) < 18) reason = 'Для участия необходимо быть старше 18 лет.';
      return '<div style="text-align:center;padding:40px 0">' +
        '<h2>Спасибо за интерес</h2>' +
        '<p>К сожалению, вы не подходите под критерии участия.</p>' +
        '<p style="color:var(--muted);margin-top:12px">' + reason + '</p>' +
        '</div>';
    },
    choices: [],
  };

  // ── Инструкция ─────────────────────────────────────────────────
  var trialInstructions = {
    type: jsPsychInstructions,
    pages: [
      '<h2>Добро пожаловать!</h2>' +
      '<p>Вы участвуете в исследовании систем синтеза речи.</p>' +
      '<p>Вам предстоит прослушать короткие аудиозаписи и оценить их качество. Всего около 35 записей.</p>' +
      '<p>Время прохождения: <strong>20–25 минут</strong>.<br>' +
      'Пожалуйста, слушайте в наушниках или через внешние колонки в тихом помещении.</p>',

      '<h2>Как оценивать</h2>' +
      '<p>Для каждой записи вы выставите оценку от 1 до 5:</p>' +
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin:16px 0">' +
      '<div style="display:grid;grid-template-columns:auto 1fr;gap:10px 16px;align-items:start">' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">5</span>' +
      '<span><strong>Очень естественно</strong> — практически как живая речь</span>' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">4</span>' +
      '<span><strong>Естественно</strong> — звучит хорошо, мелкие огрехи не мешают</span>' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">3</span>' +
      '<span><strong>Нейтрально</strong> — есть недостатки, но терпимо</span>' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">2</span>' +
      '<span><strong>Неестественно</strong> — заметные проблемы, мешающие восприятию</span>' +
      '<span style="font-family:var(--mono);font-size:1.1rem;color:var(--accent);font-weight:600">1</span>' +
      '<span><strong>Очень неестественно</strong> — явные ошибки, слушать некомфортно</span>' +
      '</div></div>' +
      '<p>Если вы поставите 3 балла или ниже, появится дополнительный вопрос о том, ' +
      'что именно звучит неестественно. Это может быть: неправильное ударение, ' +
      'неестественный тембр, роботизированность, неподходящая интонация, ' +
      'неестественные паузы, посторонние шумы и другое.</p>' +
      '<p>Оценивайте каждую запись <strong>независимо</strong>, не сравнивая с предыдущими.</p>',

      '<h2>Важные правила</h2>' +
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin:16px 0;display:flex;flex-direction:column;gap:14px">' +
      '<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:1.3rem">🎧</span>' +
      '<span>Каждую запись можно прослушать <strong>не более двух раз</strong>. После второго воспроизведения кнопка плеера заблокируется.</span></div>' +
      '<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:1.3rem">⏭️</span>' +
      '<span>Кнопка <strong>«Далее»</strong> становится активной только после того, как вы прослушали запись и выставили оценку.</span></div>' +
      '<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:1.3rem">💬</span>' +
      '<span>Для некоторых коротких записей появится дополнительный вопрос о контексте — отвечайте по первому впечатлению.</span></div>' +
      '<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:1.3rem">🔄</span>' +
      '<span>Не обновляйте страницу — прогресс не сохраняется между сессиями.</span></div>' +
      '</div>',
    ],
    show_clickable_nav: true,
    button_label_next:     'Далее →',
    button_label_previous: '← Назад',
  };

  // ── Пробный блок ───────────────────────────────────────────────
  var PRACTICE_STIMULI = [
    { fileId: '11UXbG8RI5j0kD15fIEodMkxsfPRyXBDB', label: 'Запись 1 из 4', quality: 'bad'  },
    { fileId: '1oYpG5oJ6hgS8vyMlkHC6hYJ_2GNmPTSE', label: 'Запись 2 из 4', quality: 'good' },
    { fileId: '120cTFpIvUaL_EiPXNH8ni59DJD2npwNb',  label: 'Запись 3 из 4', quality: 'bad'  },
    { fileId: '1iiAgY9DqRfVQygoXLtmaYA0BrbW_6BkR',  label: 'Запись 4 из 4', quality: 'good' },
  ];

  var trialPracticeIntro = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<div style="text-align:center;padding:20px 0">' +
      '<h2>Пробный блок</h2>' +
      '<p>Перед началом вы прослушаете четыре записи в том же формате.</p>' +
      '<p>Оценивайте по первому впечатлению.</p>' +
      '</div>',
    choices: ['Начать →'],
  };

  var practiceTrials = PRACTICE_STIMULI.map(function(stim, idx) {
    var aId = 'audio-pr-' + idx;
    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: function() {
        return '<div style="background:var(--acc-l);border:1px solid var(--border);' +
          'border-radius:var(--r);padding:14px 18px;margin-bottom:20px;' +
          'display:flex;align-items:center;gap:12px">' +
          '<span style="font-family:var(--mono);font-size:.8rem;color:var(--accent);white-space:nowrap">' + stim.label + '</span>' +
          '<div style="flex:1;display:flex;flex-direction:column;gap:4px">' +
          '<audio id="' + aId + '" controls style="width:100%;height:34px"></audio>' +
          '<span class="audio-loading" id="loading-hint-' + aId + '">Загрузка аудио...</span>' +
          '</div></div>' +
          makeMosHTML('pr_mos_' + idx) +
          '<p style="font-size:.82rem;color:var(--muted);text-align:center" id="pr-hint-' + idx + '">' +
          'Прослушайте запись перед оценкой. Доступно: <strong id="pr-count-' + idx + '">2</strong></p>';
      },
      choices: ['Далее →'],
      on_load: function() {
        var btn    = document.querySelector('.jspsych-btn');
        var unlock = setupButton(btn);
        var played = false, rated = false;
        function tryUnlock() { if (played && rated) unlock(); }

        setupAudio(stim.fileId, aId, 'pr-count-' + idx, 'pr-hint-' + idx,
          function() { played = true; tryUnlock(); });

        bindMosHint('pr_mos_' + idx);

        document.querySelectorAll('input[name="pr_mos_' + idx + '"]').forEach(function(r) {
          r.addEventListener('change', function() { rated = true; tryUnlock(); });
        });
      },
      on_finish: function(data) {
        var sel = document.querySelector('input[name="pr_mos_' + idx + '"]:checked');
        data.practice_mos   = sel ? parseInt(sel.value) : null;
        data.is_practice    = true;
        data.anchor_quality = stim.quality;
      },
    };
  });

  var trialPracticeDone = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<div style="text-align:center;padding:30px 0">' +
      '<h2>Можно начинать</h2>' +
      '<p>Нажмите кнопку, чтобы перейти к основной части.</p></div>',
    choices: ['Продолжить →'],
  };

  // ── Основной блок ──────────────────────────────────────────────
  var mainTrials = SESSION.stimuli.map(function(stim, idx) {
    var fileId     = extractFileId(stim.url);
    var isDialogue = stim.block === 'dialogue';
    var aId        = 'audio-main-' + idx;
    var total      = SESSION.stimuli.length;
    var mosName    = 'mos_' + idx;

    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: function() {
        // Плеер
        var html = '<div style="background:var(--acc-l);border:1px solid var(--border);' +
          'border-radius:var(--r);padding:14px 18px;margin-bottom:' + (isDialogue ? '10px' : '20px') + ';' +
          'display:flex;align-items:center;gap:12px">' +
          '<span style="font-family:var(--mono);font-size:.78rem;color:var(--accent);white-space:nowrap">' +
          (idx + 1) + ' / ' + total + '</span>' +
          '<div style="flex:1;display:flex;flex-direction:column;gap:4px">' +
          '<audio id="' + aId + '" controls style="width:100%;height:34px"></audio>' +
          '<span class="audio-loading" id="loading-hint-' + aId + '">Загрузка аудио...</span>' +
          '</div>' +
          '<button id="skip-btn-' + idx + '" ' +
          'onclick="var b=document.querySelector(\'.jspsych-btn\');b.disabled=false;b.style.opacity=\'1\';b.style.cursor=\'pointer\';" ' +
          'style="font-family:var(--mono);font-size:.75rem;color:var(--muted);background:none;' +
          'border:none;cursor:pointer;text-decoration:underline;padding:0;white-space:nowrap">' +
          'Пропустить при ошибке загрузки</button>' +
          '</div>';

        // Текст реплики для диалоговых
        if (isDialogue && stim.text) {
          html += '<div class="replica-text">' + stim.text + '</div>';
        }

        // MOS шкала
        html += makeMosHTML(mosName);

        // Диагностика (показывается при MOS ≤ 3)
        html += '<div class="diag-block" id="diag-' + idx + '">' +
          '<p>Что именно звучит неестественно? (можно выбрать несколько)</p>' +
          [
            ['Неправильное ударение в словах',           'ударение'],
            ['Неправильные звуки в словах',              'звуки'],
            ['Неестественный или неприятный тембр',      'тембр'],
            ['Роботизированность, отсутствие эмоций',    'роботизированность'],
            ['Неестественные паузы',                     'паузы'],
            ['Резкие скачки интонации',                  'скачки'],
            ['Неподходящая интонация',                   'интонация'],
            ['Носовой или гнусавый оттенок голоса',      'носовой'],
            ['Посторонние шумы или помехи в записи',     'шумы'],
          ].map(function(pair) {
            return '<label class="diag-option">' +
              '<input type="checkbox" name="diag_' + idx + '" value="' + pair[1] + '">' +
              pair[0] + '</label>';
          }).join('') +
          '<label class="diag-option">' +
          '<input type="checkbox" name="diag_' + idx + '" value="другое" id="diag-other-cb-' + idx + '">' +
          'Другое</label>' +
          '<input type="text" class="diag-other" id="diag-other-text-' + idx + '" placeholder="Опишите кратко...">' +
          '</div>';

        // Контекст для диалоговых реплик
        if (isDialogue) {
          html += '<div class="context-block">' +
            '<p>Где вы могли бы услышать эту фразу?</p>' +
            [
              ['В ответ на вопрос или реплику собеседника',         'answer'],
              ['Чтобы спросить о чём-то',                           'question'],
              ['Чтобы попросить или подтолкнуть к действию',        'imperative'],
              ['Выражая удивление, радость или недовольство',        'emotional'],
              ['Как утверждение или согласие',                       'statement'],
              ['Как связку в разговоре («ну», «значит», «в общем»)', 'discourse'],
              ['Затрудняюсь определить',                             'unknown'],
            ].map(function(pair) {
              return '<label class="context-option">' +
                '<input type="radio" name="ctx_' + idx + '" value="' + pair[1] + '">' +
                pair[0] + '</label>';
            }).join('') + '</div>';
        }

        html += '<p style="font-size:.82rem;color:var(--muted);text-align:center;margin-top:12px" id="main-hint-' + idx + '">' +
          'Прослушайте запись перед оценкой. Доступно: <strong id="main-count-' + idx + '">2</strong></p>';

        return html;
      },

      choices: ['Далее →'],

      on_load: function() {
        var btn         = document.querySelector('.jspsych-btn');
        var unlock      = setupButton(btn);
        var played      = false;
        var rated       = false;
        var hasCtx      = !isDialogue;

        var curMos  = null;
        var curDiag = [];
        var curCtx  = null;

        function tryUnlock() { if (played && rated && hasCtx) unlock(); }

        setupAudio(fileId, aId, 'main-count-' + idx, 'main-hint-' + idx,
          function() { played = true; tryUnlock(); });

        bindMosHint(mosName);

        document.querySelectorAll('input[name="' + mosName + '"]').forEach(function(r) {
          r.addEventListener('change', function() {
            curMos = parseInt(this.value);
            rated  = true;
            var diagBlock = document.getElementById('diag-' + idx);
            if (curMos <= 3) {
              diagBlock.classList.add('visible');
            } else {
              diagBlock.classList.remove('visible');
              curDiag = [];
            }
            tryUnlock();
          });
        });

        document.querySelectorAll('[name="diag_' + idx + '"]').forEach(function(cb) {
          cb.addEventListener('change', function() {
            curDiag = [];
            document.querySelectorAll('input[name="diag_' + idx + '"]:checked').forEach(function(c) {
              curDiag.push(c.value);
            });
          });
        });

        var otherCb  = document.getElementById('diag-other-cb-' + idx);
        var otherTxt = document.getElementById('diag-other-text-' + idx);
        if (otherCb && otherTxt) {
          otherCb.addEventListener('change', function() {
            otherTxt.style.display = this.checked ? 'block' : 'none';
          });
        }

        if (isDialogue) {
          document.querySelectorAll('input[name="ctx_' + idx + '"]').forEach(function(r) {
            r.addEventListener('change', function() {
              curCtx = this.value;
              hasCtx = true;
              tryUnlock();
            });
          });
        }

        SESSION['_t' + idx] = {
          getMos:  function() { return curMos; },
          getDiag: function() {
            var d = curDiag.slice();
            if (otherTxt && otherTxt.value.trim() && otherCb && otherCb.checked) {
              d.push('другое: ' + otherTxt.value.trim());
            }
            return d;
          },
          getCtx: function() { return curCtx; },
        };
      },

      on_finish: function() {
        var t   = SESSION['_t' + idx];
        var mos = t ? t.getMos()  : null;
        var dg  = t ? t.getDiag() : [];
        var ctx = t ? t.getCtx()  : null;

        SESSION.responses.push({
          participant_id:   SESSION.participant_id,
          bibd_key:         SESSION.bibd_key,
          survey_set:       SESSION.survey_set,
          timestamp:        new Date().toISOString(),
          block:            stim.block,
          text_id:          stim.text_id,
          system:           stim.system,
          order:            stim.order,
          mos_score:        mos,
          diagnostics:      dg,
          func_type:   ctx,
        });

        delete SESSION['_t' + idx];
      },
    };
  });

  // ── Завершение ─────────────────────────────────────────────────
  var trialGoodbye = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<div style="text-align:center;padding:40px 0">' +
      '<img src="./image.png" alt="Вот Вам котик)" style="max-width:300px;border-radius:12px;margin-bottom:20px">' +
      '<h2>Спасибо за участие!</h2>' +
      '<p>Ваши ответы сохранены. Страницу можно закрыть.</p>' +
      '</div>',
    choices: [],
    on_load: async function() { await sendResults(); },
  };

  // ── Запуск ─────────────────────────────────────────────────────
  function isDisqualified() {
    var s = SESSION.screening;
    return s.native  === 'no'  ||
           s.hearing === 'yes' ||
           parseInt(s.age) < 18;
  }

  if (DEBUG) {
    jsPsych.run(mainTrials.concat([trialGoodbye]));
  } else {
    jsPsych.run([
      trialAssigned,
      trialScreening,
      {
        timeline: [trialDisqualified],
        conditional_function: isDisqualified,
      },
      {
        timeline: [trialInstructions, trialPracticeIntro]
          .concat(practiceTrials)
          .concat([trialPracticeDone])
          .concat(mainTrials)
          .concat([trialGoodbye]),
        conditional_function: function() { return !isDisqualified(); },
      },
    ]);
  }
}

init();
</script>
</body>
</html>
