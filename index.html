<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оценка качества синтезированной речи</title>

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap"
        rel="stylesheet">

  <style>
    :root {
      --bg:      #f4f3ef;
      --surface: #ffffff;
      --border:  #ddd9d0;
      --text:    #1a1916;
      --muted:   #706f6a;
      --accent:  #2d5fa6;
      --acc-l:   #e8eef8;
      --r:       6px;
      --mono:    "IBM Plex Mono", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "IBM Plex Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
    }

    #jspsych-target {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .jspsych-content-wrapper { width: 100%; max-width: 680px; }
    .jspsych-content          { max-width: 680px; }

    .jspsych-progressbar-container { background: var(--border); height: 4px; }
    .jspsych-progressbar-inner {
      background: var(--accent);
      height: 4px;
      transition: width .3s;
    }

    h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 14px; }
    p  { margin-bottom: 10px; }

    .jspsych-btn {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: .95rem;
      font-weight: 500;
      padding: 10px 28px;
      border-radius: var(--r);
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: opacity .15s;
    }
    .jspsych-btn:hover { opacity: .87; }

    .loading-box {
      text-align: center;
      padding: 60px 20px;
    }
    .loading-box p { color: var(--muted); font-size: .95rem; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pid-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: .95rem;
      background: var(--acc-l);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 4px 12px;
      margin: 8px 0 16px;
      color: var(--accent);
    }

    .warn-box {
      background: #fff8e1;
      border: 1px solid #f0c040;
      border-radius: var(--r);
      padding: 14px 18px;
      margin: 14px 0;
      font-size: .9rem;
      color: #5a4a00;
    }

    .full-box {
      text-align: center;
      padding: 60px 20px;
    }
    .full-box h2 { font-size: 1.5rem; margin-bottom: 12px; }
    .full-box p  { color: var(--muted); }
  </style>
</head>
<body>
<div id="jspsych-target"></div>

<script>
//
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbxQ04SXN7KwFAFBt-bJcUyruT2fuTRqwyIkoY9WLUvJ_qiuSRHaesJyjl3zazstniaw7g/exec';
const BIBD_URL = './bibd_assignments.json';
//

const SESSION = {
  participant_id: null,
  survey_set:     null,
  stimuli:        [],
};

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('Не удалось загрузить файл: ' + url);
  return r.json();
}

async function gasGet(action) {
  return fetchJSON(GAS_URL + '?action=' + action);
}

function pidToSetNumber(pid) {
  return parseInt(pid.replace('P', ''), 10);
}

const jsPsych = initJsPsych({
  display_element:          'jspsych-target',
  show_progress_bar:        true,
  auto_update_progress_bar: true,
});

// ── Экран загрузки ────────────────────────────────────────────────
const trialLoading = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="loading-box">
      <div class="spinner"></div>
      <h2>Подготовка...</h2>
      <p>Загружаем материалы и назначаем персональный набор.<br>
         Это займёт несколько секунд.</p>
    </div>`,
  choices: [],
  trial_duration: null,

  on_load: async function () {
    try {
      // Шаг 1: назначаем участника
      const assignResult = await gasGet('assign');

      if (assignResult.status === 'full') {
        document.querySelector('.jspsych-content').innerHTML = `
          <div class="full-box">
            <h2>Набор участников завершён</h2>
            <p>Спасибо за интерес к исследованию.<br>
               К сожалению, все места уже заняты.</p>
          </div>`;
        return;
      }

      SESSION.participant_id = assignResult.participant_id;
      SESSION.survey_set     = pidToSetNumber(SESSION.participant_id);

      // Шаг 2: загружаем BIBD и достаём стимулы этого участника
      const bibd      = await fetchJSON(BIBD_URL);
      const key       = SESSION.participant_id;

      if (!bibd[key]) {
        throw new Error('Набор для ' + key + ' не найден в BIBD');
      }

      SESSION.stimuli = bibd[key];

      // Шаг 3: переходим дальше
      jsPsych.finishTrial();

    } catch (err) {
      document.querySelector('.jspsych-content').innerHTML = `
        <div class="full-box">
          <h2>Ошибка загрузки</h2>
          <p>${err.message}</p>
          <p style="margin-top:20px">
            <button class="jspsych-btn" onclick="location.reload()">
              Попробовать снова
            </button>
          </p>
        </div>`;
    }
  },
};

// ── Экран подтверждения ───────────────────────────────────────────
const trialAssigned = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Всё готово!</h2>
    <p>Пожалуйста, не обновляйте страницу и не закрывайте
       эту вкладку до завершения опроса, иначе прогресс
       не сохранится:( </p>`,
  choices: ['Начать →'],
};
// ── Запуск ────────────────────────────────────────────────────────
jsPsych.run([
  trialLoading,
  trialAssigned,
]);
</script>
</body>
</html>
