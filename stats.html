<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Статистика опросника</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #f4f3ef;
      --surface:#ffffff;
      --border: #ddd9d0;
      --text:   #1a1916;
      --muted:  #706f6a;
      --accent: #2d5fa6;
      --green:  #2a7d4f;
      --r:      8px;
      --mono:   "IBM Plex Mono", monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "IBM Plex Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 32px; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px 16px;
    }
    .stat-num {
      font-family: var(--mono);
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-box.entered  .stat-num { color: var(--accent); }
    .stat-box.completed .stat-num { color: var(--green); }
    .stat-label { font-size: .82rem; color: var(--muted); line-height: 1.3; }

    .conversion {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .conversion strong { color: var(--text); }

    .bar-wrap {
      background: var(--bg);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
      transition: width .6s ease;
    }

    .refresh-btn {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: .9rem;
      font-weight: 500;
      padding: 9px 24px;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background .15s;
    }
    .refresh-btn:hover { background: var(--bg); }

    .updated {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 12px;
      font-family: var(--mono);
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:.9rem">Загрузка...</p>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxQ04SXN7KwFAFBt-bJcUyruT2fuTRqwyIkoY9WLUvJ_qiuSRHaesJyjl3zazstniaw7g/exec';

async function loadStats() {
  const card = document.getElementById('card');
  try {
    const r    = await fetch(GAS_URL + '?action=stats');
    const data = await r.json();

    const entered    = data.entered    || 0;
    const completed  = data.completed  || 0;
    const pct        = entered > 0 ? Math.round(completed / entered * 100) : 0;
    const now        = new Date().toLocaleTimeString('ru-RU');

    card.innerHTML =
      '<h1>Статистика опросника</h1>' +
      '<p class="subtitle">Обновляется при каждом открытии страницы</p>' +

      '<div class="stats">' +
        '<div class="stat-box entered">' +
          '<div class="stat-num" id="n-entered">' + entered + '</div>' +
          '<div class="stat-label">зашли<br>на сайт</div>' +
        '</div>' +
        '<div class="stat-box completed">' +
          '<div class="stat-num" id="n-completed">' + completed + '</div>' +
          '<div class="stat-label">прошли<br>до конца</div>' +
        '</div>' +
      '</div>' +

      '<div class="bar-wrap">' +
        '<div class="bar-fill" id="bar" style="width:0%"></div>' +
      '</div>' +

      '<p class="conversion">Завершили тест: <strong>' + pct + '%</strong></p>' +

      '<button class="refresh-btn" onclick="location.reload()">Обновить</button>' +
      '<p class="updated">обновлено в ' + now + '</p>';

    // Анимируем полосу
    setTimeout(function() {
      document.getElementById('bar').style.width = pct + '%';
    }, 100);

  } catch (err) {
    card.innerHTML =
      '<h1>Ошибка загрузки</h1>' +
      '<p style="color:var(--muted);margin-top:8px">' + err.message + '</p>' +
      '<button class="refresh-btn" style="margin-top:20px" onclick="location.reload()">Попробовать снова</button>';
  }
}

loadStats();
</script>
</body>
</html>
